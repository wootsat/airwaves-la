<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live TV Player with Casting</title>
    
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    
    <script src="https://www.gstatic.com/cv/js/sender/v1/cast_sender.js?loadCastFramework=1"></script>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            color: #ffffff;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        .sidebar {
            width: 250px;
            background-color: #1e1e1e;
            border-right: 1px solid #333;
            display: flex;
            flex-direction: column;
        }

        .sidebar-header {
            padding: 20px;
            font-size: 1.2rem;
            font-weight: bold;
            border-bottom: 1px solid #333;
            text-align: center;
        }

        .channel-list {
            list-style: none;
            padding: 0;
            margin: 0;
            overflow-y: auto;
        }

        .channel-item {
            padding: 15px 20px;
            cursor: pointer;
            border-bottom: 1px solid #2a2a2a;
            transition: background-color 0.2s;
        }

        .channel-item:hover, .channel-item.active {
            background-color: #3a3a3a;
            color: #4da6ff;
        }

        .main-content {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background-color: #000000;
        }

        .video-wrapper {
            width: 90%;
            max-width: 1200px;
            position: relative;
        }

        .video-container {
            width: 100%;
            aspect-ratio: 16 / 9;
            background-color: #111;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        /* Added x-webkit-airplay to allow native AirPlay in Safari */
        video {
            width: 100%;
            height: 100%;
            outline: none;
        }

        .controls-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: #1e1e1e;
            padding: 10px 20px;
            margin-top: 10px;
            border-radius: 5px;
        }
        
        .now-playing {
            font-size: 1.2rem;
            color: #ddd;
        }

        .cast-buttons {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        /* Native Google Cast Button */
        google-cast-launcher {
            width: 36px;
            height: 36px;
            cursor: pointer;
        }

        /* Custom AirPlay Button (hidden by default unless on Apple device) */
        #airplayBtn {
            display: none; 
            background: none;
            border: none;
            color: white;
            cursor: pointer;
            padding: 5px;
        }

        #airplayBtn svg {
            width: 28px;
            height: 28px;
            fill: currentColor;
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="sidebar-header">Live Channels</div>
        <ul class="channel-list" id="channelList">
            <li class="channel-item active" data-url="https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8">Channel 1 (Test Stream)</li>
            <li class="channel-item" data-url="https://cph-p2p-msl.akamaized.net/hls/live/2000341/test/master.m3u8">Channel 2 (Akamai Test)</li>
        </ul>
    </div>

    <div class="main-content">
        <div class="video-wrapper">
            <div class="video-container">
                <video id="tvPlayer" controls autoplay muted x-webkit-airplay="allow"></video>
            </div>
            
            <div class="controls-bar">
                <div class="now-playing" id="nowPlayingText">Select a channel...</div>
                
                <div class="cast-buttons">
                    <google-cast-launcher></google-cast-launcher>
                    
                    <button id="airplayBtn" title="AirPlay">
                        <svg viewBox="0 0 24 24">
                            <path d="M6 22h12l-6-6zM21 3H3c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h4v-2H3V5h18v12h-4v2h4c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2z"/>
                        </svg>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const video = document.getElementById('tvPlayer');
        const channelItems = document.querySelectorAll('.channel-item');
        const nowPlayingText = document.getElementById('nowPlayingText');
        const airplayBtn = document.getElementById('airplayBtn');
        let hls; 
        let currentStreamUrl = '';
        let currentChannelName = '';

        // --- 1. CHROMECAST SETUP ---
        window.__onGCastApiAvailable = function(isAvailable) {
            if (isAvailable) {
                // Initialize the Cast Context using the Default Media Receiver
                cast.framework.CastContext.getInstance().setOptions({
                    receiverApplicationId: chrome.cast.media.DEFAULT_MEDIA_RECEIVER_APP_ID,
                    autoJoinPolicy: chrome.cast.AutoJoinPolicy.ORIGIN_SCOPED
                });

                // Listen for when a Chromecast session starts so we can immediately cast the active stream
                cast.framework.CastContext.getInstance().addEventListener(
                    cast.framework.CastContextEventType.SESSION_STATE_CHANGED,
                    function(event) {
                        if (event.sessionState === cast.framework.SessionState.SESSION_STARTED) {
                            castCurrentStream();
                        }
                    }
                );
            }
        };

        function castCurrentStream() {
            const castSession = cast.framework.CastContext.getInstance().getCurrentSession();
            if (castSession && currentStreamUrl) {
                // Tell Chromecast we are sending an HLS live stream
                const mediaInfo = new chrome.cast.media.MediaInfo(currentStreamUrl, 'application/x-mpegurl');
                mediaInfo.streamType = chrome.cast.media.StreamType.LIVE;
                mediaInfo.metadata = new chrome.cast.media.GenericMediaMetadata();
                mediaInfo.metadata.title = currentChannelName;

                const request = new chrome.cast.media.LoadRequest(mediaInfo);
                castSession.loadMedia(request).catch(error => console.error('Error casting:', error));
            }
        }

        // --- 2. AIRPLAY SETUP ---
        // Check if the browser supports AirPlay (Safari)
        if (window.WebKitPlaybackTargetAvailabilityEvent) {
            video.addEventListener('webkitplaybacktargetavailabilitychanged', function(event) {
                if (event.availability === 'available') {
                    airplayBtn.style.display = 'block';
                }
            });

            airplayBtn.addEventListener('click', function() {
                // This triggers the native iOS/macOS AirPlay menu
                video.webkitShowPlaybackTargetPicker();
            });
        }

        // --- 3. VIDEO PLAYBACK LOGIC ---
        function playStream(url, channelName) {
            currentStreamUrl = url;
            currentChannelName = channelName;
            nowPlayingText.textContent = "Watching: " + channelName;

            // If a Chromecast session is active, push the new channel to the TV
            const castSession = cast?.framework?.CastContext?.getInstance()?.getCurrentSession();
            if (castSession) {
                castCurrentStream();
                video.pause(); // Pause local playback while casting
                return; 
            }

            // Otherwise, play locally
            if (Hls.isSupported()) {
                if (hls) hls.destroy(); 
                hls = new Hls();
                hls.loadSource(url);
                hls.attachMedia(video);
                hls.on(Hls.Events.MANIFEST_PARSED, function() {
                    video.play().catch(e => console.log("Autoplay prevented", e));
                });
            } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                video.src = url;
                video.addEventListener('loadedmetadata', function() {
                    video.play().catch(e => console.log("Autoplay prevented", e));
                });
            }
        }

        // --- 4. UI INTERACTION ---
        channelItems.forEach(item => {
            item.addEventListener('click', function() {
                channelItems.forEach(i => i.classList.remove('active'));
                this.classList.add('active');
                playStream(this.getAttribute('data-url'), this.textContent);
            });
        });

        // Autoplay first channel on load
        if (channelItems.length > 0) {
            playStream(channelItems[0].getAttribute('data-url'), channelItems[0].textContent);
        }
    </script>
</body>
</html>
